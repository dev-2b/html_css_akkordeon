<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arbeitsdatei projekt_akkordeon</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>
  <!--Akkordeon-Rahmen -->
  <div id="accordianFrame">

    <div id="titleBox">
      <span>Weltenwanderer</span>
    </div>

    <!-- Panel 1 (Text ergänzt) -->
    <div id="acc1">
      <div id="glow1" class="glow"></div>
      <img src="images/bild1.jpg" alt="Morgenlicht">
      <div id="acc1T">
        <h2>Morgenlicht</h2>
        <p>Ein ruhiger Einstieg mit klarer Fläche.</p>
      </div>
    </div>

    <!-- Panel 2 -->
    <div id="acc2">
      <div id="glow2" class="glow"></div>
      <img src="images/bild2.jpg" alt="Wärme">
      <div id="acc2T">
        <h2>Wärme</h2>
        <p>Farbe, Tiefe und Kontrast für den aktiven Zustand.</p>
      </div>
    </div>

    <!-- Panel 3 -->
    <div id="acc3">
      <div id="glow3" class="glow"></div>
      <img src="images/bild3.jpg" alt="Weite">
      <div id="acc3T">
        <h2>Weite</h2>
        <p>Das Panel wächst weich und bleibt lesbar.</p>
      </div>
    </div>

    <!-- Panel 4 -->
    <div id="acc4">
      <div id="glow4" class="glow"></div>
      <img src="images/bild4.jpg" alt="Fokus">
      <div id="acc4T">
        <h2>Fokus</h2>
        <p>Hover und Fokus zeigen dieselbe visuelle Logik.</p>
      </div>
    </div>

    <!-- Panel 5 -->
    <div id="acc5">
      <div id="glow5" class="glow"></div>
      <img src="images/bild5.jpg" alt="Abschluss">
      <div id="acc5T">
        <h2>Abschluss</h2>
        <p>Auch mobil bleibt jedes Panel erreichbar.</p>
      </div>
    </div>

  </div>
</body>

</html>
